repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.18
    hooks:
      - id: ruff-check
      - id: ruff-format

  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: v0.0.51
    hooks:
      - id: ty

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: .venv/bin/pytest .
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        repos:

      - id: check-icons-palette
        name: check icons palette
        language: python
        entry: uv run check-icons-palette
        pass_filenames: false
